<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定星盤資料</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; background-color: #f5f5f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 30px; background-color: #06c755; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { background-color: #05b34c; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔮 開啟您的魔法旅程</h2>
        
        <label>🏷️ 您的暱稱</label>
        <input type="text" id="nickname" placeholder="ex:小明" required>

        <label>📅 出生日期</label>
        <input type="date" id="date" required>
        
        <label>⏰ 出生時間</label>
        <input type="time" id="time" required>
        
        <label>📍 出生城市</label>
        <input type="text" id="city" placeholder="例如：台北市" value="台北市">

        <label>👤 性別</label>
        <select id="gender" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: white;">
            <option value="F">女性</option>
            <option value="M">男性</option>
            <option value="U">不透露</option>
        </select>

        <button id="btn" onclick="send()">確認送出</button>
    </div>

    <script>
        const LIFF_ID = "2009047186-VUUAVTF4";
        // 這裡要填入您主工作流中「新 Webhook」的 Production URL
        const WEBHOOK_URL = "https://webbermars.app.n8n.cloud/webhook/liff-register"; 

        liff.init({ liffId: LIFF_ID }).catch(err => {
            alert("啟動失敗");
        });

    async function send() {
        // 獲取各欄位數值，包含新增的 nickname
        const nick = document.getElementById('nickname').value;
        const d = document.getElementById('date').value;
        const t = document.getElementById('time').value;
        const c = document.getElementById('city').value;
        const g = document.getElementById('gender').value;

        // 驗證是否填寫完整
        if (!nick || !d || !t || !c || !g) {
            alert("請完整填寫資料喔！");
            return;
        }

        const [hour, minute] = t.split(':');
        const h = parseInt(hour);
        const period = h >= 12 ? "下午 (PM)" : "上午 (AM)";
        const displayH = h > 12 ? h - 12 : (h === 0 ? 12 : h);
        const genderText = { "F": "女性", "M": "男性", "U": "不透露/中性" }[g];
    
        // 在確認視窗中加入暱稱顯示
        if (!confirm(`確認送出資料嗎？\n暱稱：${nick}\n日期：${d}\n時間：${period} ${displayH}:${minute}\n城市：${c}\n性別：${genderText}`)) {
            return;
        }

        try {
            // 獲取使用者 userId
            const profile = await liff.getProfile();
            const userId = profile.userId;

            // 透過 API 傳送資料給 n8n
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: userId,
                    nickname: nick, // 將暱稱傳送至後端
                    date: d,
                    time: t,
                    city: c,
                    gender: g,
                    type: "api_registration" // 標註這是從 API 來的
                })
            });

            if (response.ok) {
                // 成功後直接關閉
                liff.closeWindow();
            } else {
                alert("傳送失敗，請聯繫管理員");
            }
        } catch (err) {
            alert("錯誤: " + err.message);
        }
    }
    </script>
</body>
</html>
