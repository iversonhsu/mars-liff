<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星獸靈氣挑戰</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f0f2f5;
        }
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .quiz-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: var(--primary-color); margin-bottom: 25px; }
        .question-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            text-align: left;
            color: #2d3436;
        }
        .options { display: flex; flex-direction: column; gap: 15px; }
        .option {
            padding: 15px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-weight: bold;
        }
        .option:hover { border-color: var(--primary-color); background: #f9f9ff; }
        .option.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
        #submit-btn {
            margin-top: 30px;
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        #submit-btn:disabled { background-color: #ccc; cursor: not-allowed; }
        #loading-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; font-weight: bold; color: var(--primary-color);
        }
    </style>
</head>
<body>

<div id="loading-mask">🌟 正在開啟靈氣挑戰...</div>

<div class="quiz-container">
    <h2>🌟 靈氣挑戰</h2>
    <div id="question" class="question-text">載入題目中...</div>
    
    <div class="options">
        <div class="option" onclick="selectOption('A')" id="opt-A">
            <span id="label-a">選項載入中...</span>
        </div>
        <div class="option" onclick="selectOption('B')" id="opt-B">
            <span id="label-b">選項載入中...</span>
        </div>
        <div class="option" onclick="selectOption('C')" id="opt-C">
            <span id="label-c">選項載入中...</span>
        </div>
    </div>

    <button id="submit-btn" onclick="submitAnswer()" disabled>提交答案</button>
</div>

<script>
    let selectedAnswer = "";
    let currentAnswer = "";
    let currentQid = "";
    let currentUid = "";
    let currentDate = "";

    // 🚀 初始化載入
    window.onload = async function() {
        const urlParams = new URLSearchParams(window.location.search);
        const qid = urlParams.get('qid');
        const uid = urlParams.get('uid');
        
        // 取得今天的日期 (格式 YYYY-MM-DD)
        const now = new Date();
        currentDate = now.toLocaleDateString('sv-SE'); // YYYY-MM-DD

        if (qid && uid) {
            try {
                // 🛠️ 向妳的 n8n 「領題線」發送請求
                const response = await fetch(`https://webbermars.app.n8n.cloud/webhook/get-question?qid=${qid}`);
                const data = await response.json();

                // 將抓到的題目資料填入網頁
                document.getElementById('question').innerText = data.question;
                document.getElementById('label-a').innerText = data.option_a;
                document.getElementById('label-b').innerText = data.option_b;
                document.getElementById('label-c').innerText = data.option_c;

                // 儲存資訊供後續提交使用
                currentAnswer = data.answer;
                currentQid = qid;
                currentUid = uid;

                // 關閉遮罩
                document.getElementById('loading-mask').style.display = 'none';
            } catch (error) {
                console.error("領取題目失敗:", error);
                document.getElementById('question').innerText = "⚠️ 載入失敗，請關閉後重新開啟";
            }
        } else {
            document.getElementById('question').innerText = "❌ 參數缺失，請從 LINE 開啟";
        }
    };

    function selectOption(ans) {
        selectedAnswer = `(${ans})`;
        document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
        document.getElementById(`opt-${ans}`).classList.add('selected');
        document.getElementById('submit-btn').disabled = false;
    }

    async function submitAnswer() {
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "提交中...";

        const isCorrect = (selectedAnswer === currentAnswer);

        // 🛠️ 提交到妳的 n8n 「提交線」
        const submitData = {
            userId: currentUid,
            currentQid: currentQid,
            isCorrect: isCorrect,
            date: currentDate
        };

        try {
            await fetch('https://webbermars.app.n8n.cloud/webhook/quiz-submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(submitData)
            });
            alert(isCorrect ? "✨ 太棒了！答對了！" : "💪 再接再厲，下次會更好！");
            liff.closeWindow();
        } catch (e) {
            alert("提交失敗，請檢查網路連線");
            btn.disabled = false;
            btn.innerText = "提交答案";
        }
    }
</script>

</body>
</html>
